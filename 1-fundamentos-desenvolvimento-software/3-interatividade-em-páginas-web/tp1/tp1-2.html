<h1>2 Propriedades de objeto</h1>
<p>No arquivo script.js, siga as etapas abaixo:</p>
<ul>
  <li>Crie um objeto “carro” que possua as propriedades “ano” e “modelo”, ambas com valores vazios.</li>
  <li>Após à criação, faça a propriedade “ano” receber “1968” e a propriedade “modelo” receber “Fusca”.</li>
</ul>

<hr>
<pre>Resultado via console.</pre>

<script>
const carro = {
  ano: undefined,
  modelo: undefined,
};

console.log("carro: ", carro)

carro.ano = 2020;
carro.modelo = "onix";

console.log("carro: ", carro)
</script>
