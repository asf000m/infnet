<h1>1 Criando um objeto</h1>
<p>No arquivo script.js, crie um objeto “pessoa” que possua as propriedades “nome” e “idade” e preencha com valores fixos definidos por você.</p>

<hr>
<pre>Resultado via console.</pre>

<script>
const pessoa = {
  nome: "Aristóteles",
  idade: "60"
};
console.log("pessoa: ", pessoa)
</script>
